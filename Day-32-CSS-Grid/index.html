<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Web Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Web Page Title -->
    <title>Day 32 - CSS Grid</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- Main Heading -->

    <h1>🔲 CSS Grid Layout</h1>

    <hr>

    <h2>Grid Layout Example</h2>

    <div class="grid-container">

        <div class="grid-item">HTML</div>

        <div class="grid-item">CSS</div>

        <div class="grid-item">JavaScript</div>

        <div class="grid-item">React</div>

        <div class="grid-item">Node.js</div>

        <div class="grid-item">MongoDB</div>

    </div>

    <hr>

    <h2>Grid Item Span Example</h2>

    <div class="grid-layout">

        <div class="item header">Header</div>

        <div class="item sidebar">Sidebar</div>

        <div class="item content">Content</div>

        <div class="item footer">Footer</div>

    </div>

    <hr>

    <h3>🎉 Congratulations!</h3>

    <p>You have successfully completed your Day 32 CSS practice.</p>

    <p>See you in Day 33 - CSS Float and Clear.</p>

</body>
</html>
