<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Web Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Web Page Title -->
    <title>Day 15 - HTML Figure and Figcaption</title>

</head>
<body>

    <!-- Main Heading -->
    <h1>🖼️ HTML Figure and Figcaption</h1>

    <!-- Horizontal Rule -->
    <hr>

    <!-- Figure Tag -->
    <!-- <figure> is used to group media content. -->
    <h2>Figure Tag</h2>

    <figure>

        <img src="nature.jpg" alt="Nature Image" width="400">

        <figcaption>
            Figure 1: Beautiful Nature Image
        </figcaption>

    </figure>

    <!-- Horizontal Rule -->
    <hr>

    <!-- Another Figure Example -->
    <h2>Another Figure Example</h2>

    <figure>

        <img src="computer.jpg" alt="Computer Image" width="400">

        <figcaption>
            Figure 2: Computer Setup
        </figcaption>

    </figure>

    <!-- Horizontal Rule -->
    <hr>

    <!-- Congratulations Message -->
    <h3>🎉 Congratulations!</h3>

    <p>You have successfully completed your Day 15 HTML practice.</p>

    <p>See you in Day 16 - HTML Details and Summary.</p>

</body>
</html>
