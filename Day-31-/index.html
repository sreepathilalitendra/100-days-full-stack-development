<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Web Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Web Page Title -->
    <title>Day 31 - CSS Flexbox</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- Main Heading -->

    <h1>📦 CSS Flexbox</h1>

    <hr>

    <h2>Flex Container</h2>

    <div class="container">

        <div class="box">HTML</div>

        <div class="box">CSS</div>

        <div class="box">JavaScript</div>

        <div class="box">React</div>

    </div>

    <hr>

    <h2>justify-content: space-between</h2>

    <div class="container space-between">

        <div class="box">1</div>

        <div class="box">2</div>

        <div class="box">3</div>

    </div>

    <hr>

    <h2>align-items: center</h2>

    <div class="container align-center">

        <div class="box">A</div>

        <div class="box">B</div>

        <div class="box">C</div>

    </div>

    <hr>

    <h3>🎉 Congratulations!</h3>

    <p>You have successfully completed your Day 31 CSS practice.</p>

    <p>See you in Day 32 - CSS Grid.</p>

</body>
</html>
