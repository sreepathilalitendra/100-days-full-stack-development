<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Web Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Web Page Title -->
    <title>Day 73 - Local Storage & Session Storage</title>

</head>
<body>

    <h1>💾 JavaScript Local Storage & Session Storage</h1>

    <hr>

    <input
        type="text"
        id="username"
        placeholder="Enter your name">

    <br><br>

    <button id="saveLocal">
        Save to Local Storage
    </button>

    <button id="getLocal">
        Get Local Storage
    </button>

    <button id="removeLocal">
        Remove Local Storage
    </button>

    <br><br>

    <button id="saveSession">
        Save to Session Storage
    </button>

    <button id="getSession">
        Get Session Storage
    </button>

    <button id="clearStorage">
        Clear Storage
    </button>

    <hr>

    <p id="output"></p>

    <script src="script.js"></script>

</body>
</html>
