<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Web Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Web Page Title -->
    <title>Day 6 - HTML Hyperlinks</title>
</head>
<body>

    <!-- Main Heading -->
    <h1>🔗 HTML Hyperlinks</h1>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- External Link -->
    <!-- Opens the OpenAI website -->
    <h2>External Link</h2>

    <a href="https://www.openai.com">
        Visit OpenAI
    </a>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Open Link in New Tab -->
    <h2>Open Link in New Tab</h2>

    <a href="https://github.com" target="_blank">
        Visit GitHub
    </a>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Email Link -->
    <h2>Email Link</h2>

    <a href="mailto:example@gmail.com">
        Send Email
    </a>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Phone Link -->
    <h2>Phone Link</h2>

    <a href="tel:+911234567890">
        Call Now
    </a>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Download Link -->
    <h2>Download Link</h2>

    <a href="sample.pdf" download>
        Download PDF
    </a>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Congratulations Message -->
    <h3>🎉 Congratulations!</h3>

    <p>You have successfully completed your Day 6 HTML practice.</p>

    <p>See you in Day 7 - HTML Audio and Video.</p>

</body>
</html>
