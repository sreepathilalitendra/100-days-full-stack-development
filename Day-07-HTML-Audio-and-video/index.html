<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Web Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Web Page Title -->
    <title>Day 7 - HTML Audio and Video</title>
</head>
<body>

    <!-- Main Heading -->
    <h1>🎵 HTML Audio and Video</h1>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Audio Tag -->
    <!-- <audio> is used to play audio files. -->
    <h2>Audio Tag</h2>

    <audio controls>
        <source src="sample.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Video Tag -->
    <!-- <video> is used to play video files. -->
    <h2>Video Tag</h2>

    <video width="500" controls>
        <source src="sample.mp4" type="video/mp4">
        Your browser does not support the video element.
    </video>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Congratulations Message -->
    <h3>🎉 Congratulations!</h3>

    <p>You have successfully completed your Day 7 HTML practice.</p>

    <p>See you in Day 8 - HTML Iframe.</p>

</body>
</html>
