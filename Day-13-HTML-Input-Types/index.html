<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Web Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Web Page Title -->
    <title>Day 13 - HTML Input Types</title>
</head>
<body>

    <!-- Main Heading -->
    <h1>⌨️ HTML Input Types</h1>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Form Tag -->
    <form>

        <!-- Text Input -->
        <label>Full Name:</label>
        <input type="text">

        <br><br>

        <!-- Password Input -->
        <label>Password:</label>
        <input type="password">

        <br><br>

        <!-- Email Input -->
        <label>Email:</label>
        <input type="email">

        <br><br>

        <!-- Number Input -->
        <label>Age:</label>
        <input type="number">

        <br><br>

        <!-- Date Input -->
        <label>Date of Birth:</label>
        <input type="date">

        <br><br>

        <!-- Time Input -->
        <label>Time:</label>
        <input type="time">

        <br><br>

        <!-- Color Input -->
        <label>Favorite Color:</label>
        <input type="color">

        <br><br>

        <!-- File Input -->
        <label>Upload File:</label>
        <input type="file">

        <br><br>

        <!-- Range Input -->
        <label>Experience:</label>
        <input type="range">

        <br><br>

        <!-- Checkbox -->
        <label>Skills:</label><br>
        <input type="checkbox"> HTML
        <input type="checkbox"> CSS
        <input type="checkbox"> JavaScript

        <br><br>

        <!-- Radio Button -->
        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female

        <br><br>

        <!-- Search Input -->
        <label>Search:</label>
        <input type="search">

        <br><br>

        <!-- URL Input -->
        <label>Website:</label>
        <input type="url">

        <br><br>

        <!-- Telephone Input -->
        <label>Phone:</label>
        <input type="tel">

        <br><br>

        <!-- Submit Button -->
        <input type="submit" value="Submit">

    </form>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Congratulations Message -->
    <h3>🎉 Congratulations!</h3>

    <p>You have successfully completed your Day 13 HTML practice.</p>

    <p>See you in Day 14 - HTML Meta Tags.</p>

</body>
</html>
