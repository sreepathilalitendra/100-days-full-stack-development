<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Web Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Web Page Title -->
    <title>Day 12 - Advanced HTML Forms</title>
</head>
<body>

    <!-- Main Heading -->
    <h1>📝 Advanced HTML Forms</h1>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Form Tag -->
    <form>

        <!-- Textarea -->
        <h2>Textarea</h2>

        <textarea rows="5" cols="40" placeholder="Enter your message"></textarea>

        <br><br>

        <!-- Select Tag -->
        <h2>Select Tag</h2>

        <select>
            <option>Select Course</option>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
            <option>React</option>
        </select>

        <br><br>

        <!-- Fieldset and Legend -->
        <fieldset>

            <legend>Student Information</legend>

            <label>Full Name:</label>
            <input type="text">

            <br><br>

            <label>Email:</label>
            <input type="email">

        </fieldset>

        <br>

        <!-- Datalist -->
        <h2>Datalist</h2>

        <input list="browsers" placeholder="Choose a browser">

        <datalist id="browsers">
            <option value="Google Chrome">
            <option value="Microsoft Edge">
            <option value="Mozilla Firefox">
            <option value="Safari">
            <option value="Opera">
        </datalist>

        <br><br>

        <!-- Submit Button -->
        <input type="submit" value="Submit">

    </form>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Congratulations Message -->
    <h3>🎉 Congratulations!</h3>

    <p>You have successfully completed your Day 12 HTML practice.</p>

    <p>See you in Day 13 - HTML Input Types.</p>

</body>
</html>
