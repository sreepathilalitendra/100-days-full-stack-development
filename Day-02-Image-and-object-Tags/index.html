<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Web Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Web Page Title -->
    <title>Day 2 - Image and Object Tags</title>
</head>
<body>

    <!-- Main Heading -->
    <h1>🖼️ HTML Image and Object Tags</h1>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Image Tag -->
    <!-- <img> is used to display an image on a webpage. -->
    <h2>Image Tag</h2>

    <img src="image.jpg" alt="Sample Image" width="300" height="200">

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Object Tag -->
    <!-- <object> is used to embed files like PDF, images, or multimedia. -->
    <h2>Object Tag</h2>

    <object data="sample.pdf" width="400" height="300"></object>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Congratulations Message -->
    <h3>🎉 Congratulations!</h3>

    <p>You have successfully completed your Day 2 HTML practice.</p>

    <p>See you in Day 3 - HTML Lists.</p>

</body>
</html>
