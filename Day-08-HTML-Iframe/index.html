<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Web Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Web Page Title -->
    <title>Day 8 - HTML Iframe</title>
</head>
<body>

    <!-- Main Heading -->
    <h1>🖥️ HTML Iframe</h1>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Iframe Tag -->
    <!-- <iframe> is used to embed another webpage inside the current webpage. -->
    <h2>Iframe Tag</h2>

    <iframe
        src="https://www.wikipedia.org"
        width="700"
        height="400"
        title="Wikipedia">
    </iframe>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Another Iframe Example -->
    <h2>Google Maps Iframe (Example)</h2>

    <iframe
        src="https://www.google.com/maps"
        width="700"
        height="400"
        title="Google Maps">
    </iframe>

    <!-- Horizontal Rule Tag -->
    <hr>

    <!-- Congratulations Message -->
    <h3>🎉 Congratulations!</h3>

    <p>You have successfully completed your Day 8 HTML practice.</p>

    <p>See you in Day 9 - Semantic HTML.</p>

</body>
</html>
