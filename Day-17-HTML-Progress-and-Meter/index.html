<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Web Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Web Page Title -->
    <title>Day 17 - HTML Progress and Meter</title>

</head>
<body>

    <!-- Main Heading -->
    <h1>📊 HTML Progress and Meter</h1>

    <!-- Horizontal Rule -->
    <hr>

    <!-- Progress Tag -->
    <!-- <progress> shows the progress of a task. -->

    <h2>Progress Tag</h2>

    <label>HTML Course Progress:</label><br><br>

    <progress value="40" max="100"></progress>

    <p>40% Completed</p>

    <!-- Horizontal Rule -->
    <hr>

    <!-- Meter Tag -->
    <!-- <meter> shows a value within a known range. -->

    <h2>Meter Tag</h2>

    <label>Battery Level:</label><br><br>

    <meter value="0.8">80%</meter>

    <p>Battery Charge: 80%</p>

    <!-- Horizontal Rule -->
    <hr>

    <!-- Another Meter Example -->

    <h2>Disk Usage</h2>

    <meter value="65" min="0" max="100"></meter>

    <p>Disk Usage: 65%</p>

    <!-- Horizontal Rule -->
    <hr>

    <!-- Congratulations Message -->

    <h3>🎉 Congratulations!</h3>

    <p>You have successfully completed your Day 17 HTML practice.</p>

    <p>See you in Day 18 - HTML Code, Pre, Kbd and Samp Tags.</p>

</body>
</html>
